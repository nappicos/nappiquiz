<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🚀 A00 with Alex · Lesson 1 · Cosmic Quiz 🌙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 40%, #010110, #000000);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: starGlow 4s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes starGlow {
            0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px #fff; }
            100% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 12px #ffec9e; }
        }
        .planet { position: fixed; font-size: 3rem; pointer-events: none; z-index: 0; filter: drop-shadow(0 0 15px cyan); }
        .earth { top: 15%; left: 5%; animation: floatEarth 20s infinite alternate; }
        .moon { bottom: 10%; right: 5%; animation: floatMoon 18s infinite alternate; }
        .mars { top: 60%; left: 85%; animation: floatMars 22s infinite alternate; }
        .rocket { position: fixed; bottom: 5%; left: 2%; font-size: 3rem; pointer-events: none; animation: flyRocket 20s infinite linear; z-index: 0; }
        @keyframes floatEarth { 0% { transform: translate(0,0); } 100% { transform: translate(40px,30px); } }
        @keyframes floatMoon { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,-20px); } }
        @keyframes floatMars { 0% { transform: translate(0,0); } 100% { transform: translate(50px,-30px); } }
        @keyframes flyRocket { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(1800px) translateY(-300px); } }

        .quiz-wrapper {
            max-width: 1000px; width: 100%; margin: 0 auto;
            background: rgba(3, 8, 20, 0.7); backdrop-filter: blur(12px);
            border-radius: 70px; padding: 1.8rem 2rem;
            border: 2px solid rgba(0, 200, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,150,255,0.4);
            z-index: 2;
        }
        h1 {
            font-size: 2rem; background: linear-gradient(135deg,#e0b0ff,#a070ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; }
        .stats { display: flex; gap: 12px; background: #0a1020cc; border-radius: 70px; padding: 10px 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #0a1a2a; padding: 7px 18px; border-radius: 40px; color: #ddf4ff; text-shadow: 0 0 4px cyan; }
        .progress-area { display: flex; gap: 18px; margin: 15px 0; align-items: center; }
        .progress-bar-bg { flex:1; background: #1a2a3a; height: 28px; border-radius: 60px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#44aaff,#2288cc); transition: width 0.5s; box-shadow: 0 0 8px cyan; }
        .question-card { background: #0a1022ee; border-radius: 52px; padding: 28px; border: 1px solid #44aaff; }
        .english-prompt {
            font-size: 1.6rem;
            background: #11223c;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            color: #f0fcff;
            text-shadow: 0 0 5px cyan;
        }
        label {
            font-weight: bold;
            color: #bbddff;
            margin-left: 0.5rem;
            text-shadow: 0 0 3px cyan;
        }
        .answer-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            background: #0c0b1f;
            border: 2px solid #5599dd;
            border-radius: 60px;
            margin: 15px 0;
            color: #e6f7ff;
            outline: none;
            transition: 0.2s;
        }
        .answer-input:focus {
            border-color: #aaffff;
            box-shadow: 0 0 12px cyan;
        }
        .feedback {
            background: #051020;
            border-radius: 56px;
            padding: 16px 28px;
            margin: 15px 0 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 1px solid #00ffff;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff, 0 0 12px #0088ff;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        .btn {
            border: none; padding: 12px 34px; border-radius: 60px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; color: white; margin: 5px;
        }
        .btn-check { background: #0066cc; box-shadow: 0 0 12px #00aaff, 0 4px 0 #003366; }
        .btn-check:hover { background: #0088ff; box-shadow: 0 0 20px #00aaff; }
        .btn-next { background: #0099cc; box-shadow: 0 0 12px #00ffff, 0 4px 0 #006699; }
        .btn-next:hover { background: #00bbff; box-shadow: 0 0 20px #00ffff; }
        .btn-restart { background: #3a2a6e; box-shadow: 0 4px 0 #1a1a4a; }
        .hidden { display: none; }
        .review { background: #0a1022ee; border-radius: 52px; padding: 28px; margin-top: 30px; }
        .mistake-item { background: #1a2a40; padding: 12px; border-radius: 40px; margin-bottom: 10px; color: #ddf4ff; border-left: 8px solid #ffaa66; }
        .inspire { background: rgba(10,20,40,0.8); border-radius: 60px; padding: 14px; text-align: center; margin-bottom: 20px; border: 1px solid cyan; color: #cceeff; text-shadow: 0 0 5px cyan; }
        @media (max-width: 768px) { .quiz-wrapper { padding: 1rem; } .english-prompt { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <div class="planet earth">🌍</div><div class="planet moon">🌙</div><div class="planet mars">🪐</div>
    <div class="rocket">🚀</div>
    <script>
        for(let i=0;i<150;i++){let s=document.createElement('div');s.classList.add('star');let sz=Math.random()*3+1;s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*6+'s';document.body.appendChild(s);}
    </script>

    <div class="quiz-wrapper" id="quizMain">
        <div class="top-bar"><h1>🌙 A00 with Alex · Lesson 1</h1><div>📘 total: 16</div></div>
        <div class="inspire" id="inspireBox"><span class="motivation-text">✨ Liebe Nafisa, jeder neue Satz ist ein Stern an deinem Himmel. ✨</span></div>
        <div id="startScreen" style="text-align:center; padding:50px 0;"><button class="btn btn-check" id="startBtn" style="font-size:2rem;">🚀 Start Quiz 🌙</button></div>
        <div id="quizInterface" class="hidden">
            <div class="stats">
                <div class="stat-card">✅ Correct: <span id="correctCount">0</span></div>
                <div class="stat-card">❌ Mistakes: <span id="mistakeCount">0</span></div>
                <div class="stat-card">🎯 Accuracy: <span id="accuracyPercent">0</span>%</div>
                <div class="stat-card">📝 Answered: <span id="answeredCount">0</span></div>
                <div class="stat-card">🌙 Remaining: <span id="remainingCount">16</span></div>
            </div>
            <div class="progress-area">
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressFraction">0/16</div>
            </div>
            <div class="question-card">
                <div class="english-prompt" id="questionPrompt">loading...</div>
                <label>🇩🇪 your German answer:</label>
                <input type="text" id="answerInput" class="answer-input" placeholder="e.g. Ich komme aus Usbekistan" autocomplete="off">
                <div class="feedback" id="feedbackArea">✨ type your answer → press Enter to check ✨</div>
                <div class="button-group"><button class="btn btn-check" id="checkBtn">✅ Check (Enter)</button><button class="btn btn-next" id="nextBtn">➡ Next (Enter)</button></div>
            </div>
            <div class="restart-area"><button class="btn btn-restart" id="restartBtn">🔄 Restart quiz</button></div>
            <div id="reviewBlock" class="review hidden"><h3 style="color:#aaffdd;">📖 Mistakes review</h3><div id="mistakeList"></div><button class="btn btn-restart" id="restartReviewBtn">🚀 Try again</button></div>
        </div>
    </div>

    <script>
        // ---------- GERMAN A00 DATA (16 questions) ----------
        const rawData = [
            { prompt: "Hello", correct: "Hallo" },
            { prompt: "My name is Nafisa", correct: "Ich heiße Nafisa / Mein Name ist Nafisa" },
            { prompt: "I am from Uzbekistan", correct: "Ich komme aus Usbekistan" },
            { prompt: "I am from Germany", correct: "Ich komme aus Deutschland" },
            { prompt: "I am from Russia", correct: "Ich komme aus Russland" },
            { prompt: "I am from Ukraine", correct: "Ich komme aus der Ukraine" },
            { prompt: "I speak German", correct: "Ich spreche Deutsch" },
            { prompt: "I speak English", correct: "Ich spreche Englisch" },
            { prompt: "I speak English and German", correct: "Ich spreche Englisch und Deutsch" },
            { prompt: "I work", correct: "Ich arbeite" },
            { prompt: "I study", correct: "Ich studiere" },
            { prompt: "I work and study", correct: "Ich arbeite und studiere" },
            { prompt: "Bye / Goodbye", correct: "Tschüss" },
            { prompt: "See you soon", correct: "Bis bald" },
            { prompt: "to be called (infinitive)", correct: "heißen" },
            { prompt: "to come", correct: "kommen" }
        ];
        const total = rawData.length;
        // shuffle helper
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        // normalise for case-insensitive, trim, accept slashes
        function normalise(str) {
            return str.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[^\wäöüßÄÖÜ\s]/g, '');
        }
        function isAnswerCorrect(user, correctField) {
            const userNorm = normalise(user);
            const alternatives = correctField.split('/').map(alt => normalise(alt));
            return alternatives.includes(userNorm);
        }
        // motivational quotes with Nafisa
        const quotes = [
            "✨ Liebe Nafisa, jeder neue Satz ist ein Stern an deinem Himmel. ✨",
            "📖 Du lernst nicht nur Deutsch – du erschaffst eine neue Welt. 🌍",
            "💪 Fehler sind Brücken zum Erfolg. Weiter so, Nafisa!",
            "🌟 Mit jeder Antwort wirst du stärker. Du schaffst das!",
            "🌙 Die deutsche Sprache liebt dich – und du liebst sie.",
            "🎓 Wissen ist Macht. Du baust deine eigene Magie, Nafisa.",
            "✨ Heute bist du besser als gestern. Das ist der Weg.",
            "💖 Ich bin so stolz auf dich, meine tapfere Lernende."
        ];
        let quoteInterval = null;
        function updateQuote() {
            const idx = Math.floor(Math.random() * quotes.length);
            const box = document.getElementById("inspireBox");
            if(box) box.innerHTML = `<span class="motivation-text">${quotes[idx]}</span>`;
        }
        function startQuotes() {
            if(quoteInterval) clearInterval(quoteInterval);
            updateQuote();
            quoteInterval = setInterval(updateQuote, 12000);
        }
        // quiz globals
        let currentQuestions = [];
        let currentIndex = 0, correct = 0, wrong = 0, mistakes = [], isAnswered = false, quizActive = false;
        // DOM elements
        const startScreenDiv = document.getElementById("startScreen");
        const quizInterfaceDiv = document.getElementById("quizInterface");
        const startBtn = document.getElementById("startBtn");
        const questionPromptSpan = document.getElementById("questionPrompt");
        const answerInput = document.getElementById("answerInput");
        const feedbackArea = document.getElementById("feedbackArea");
        const checkBtn = document.getElementById("checkBtn");
        const nextBtn = document.getElementById("nextBtn");
        const restartBtn = document.getElementById("restartBtn");
        const restartReviewBtn = document.getElementById("restartReviewBtn");
        const reviewBlock = document.getElementById("reviewBlock");
        const mistakeListDiv = document.getElementById("mistakeList");
        const correctSpan = document.getElementById("correctCount");
        const mistakeSpan = document.getElementById("mistakeCount");
        const accuracySpan = document.getElementById("accuracyPercent");
        const answeredSpan = document.getElementById("answeredCount");
        const remainingSpan = document.getElementById("remainingCount");
        const progressFill = document.getElementById("progressFill");
        const progressFraction = document.getElementById("progressFraction");

        function updateStats() {
            const answered = correct + wrong;
            answeredSpan.innerText = answered;
            remainingSpan.innerText = total - answered;
            const acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
            accuracySpan.innerText = acc;
            correctSpan.innerText = correct;
            mistakeSpan.innerText = wrong;
            const percent = (answered / total) * 100;
            progressFill.style.width = percent + "%";
            progressFraction.innerText = `${answered}/${total}`;
        }

        function loadQuestion() {
            if (!quizActive) return;
            if (currentIndex >= currentQuestions.length) {
                // finished
                questionPromptSpan.innerText = "🎉 Glückwunsch! Lesson 1 completed! 🎉";
                answerInput.disabled = true;
                checkBtn.disabled = true;
                nextBtn.disabled = true;
                feedbackArea.innerHTML = "✨ Super gemacht! Unten siehst du deine Fehler. ✨";
                reviewBlock.classList.remove("hidden");
                const mistakeHtml = mistakes.length === 0 ? "<p>✨ Perfekt! Keine Fehler – du bist klasse, Nafisa! ✨</p>" : mistakes.map(m => `
                    <div class="mistake-item">
                        <strong>❓ ${m.prompt}</strong><br>
                        ✍️ Deine Antwort: ${m.userAnswer}<br>
                        ✅ Richtig: ${m.correctAnswer}
                    </div>
                `).join("");
                mistakeListDiv.innerHTML = mistakeHtml;
                return;
            }
            const q = currentQuestions[currentIndex];
            questionPromptSpan.innerText = q.prompt;
            answerInput.value = "";
            feedbackArea.innerHTML = "✨ type your answer, then press Enter ✨";
            isAnswered = false;
            answerInput.disabled = false;
            checkBtn.disabled = false;
            nextBtn.disabled = false;
            updateStats();
        }

        function handleCheck() {
            if (!quizActive || currentIndex >= currentQuestions.length) return;
            if (isAnswered) {
                feedbackArea.innerHTML = "⚠️ Already checked! Press Next or Enter again.";
                return;
            }
            const userAnswer = answerInput.value.trim();
            if (userAnswer === "") {
                feedbackArea.innerHTML = "🌙 Bitte schreib eine Antwort, meine Liebe.";
                return;
            }
            const currentQ = currentQuestions[currentIndex];
            const correctAns = currentQ.correct;
            const isCorrect = isAnswerCorrect(userAnswer, correctAns);
            if (isCorrect) {
                feedbackArea.innerHTML = `✅ Richtig! "${correctAns.split('/')[0]}" – wunderbar! ✨`;
                correct++;
            } else {
                const displayCorrect = correctAns.split('/')[0];
                feedbackArea.innerHTML = `❌ Nicht ganz. Richtige Antwort: "${displayCorrect}".`;
                wrong++;
                mistakes.push({
                    prompt: currentQ.prompt,
                    userAnswer: userAnswer,
                    correctAnswer: correctAns
                });
            }
            isAnswered = true;
            updateStats();
        }

        function handleNext() {
            if (!quizActive || currentIndex >= currentQuestions.length) return;
            if (!isAnswered) {
                feedbackArea.innerHTML = "⚠️ Bitte zuerst die Antwort prüfen (Enter).";
                return;
            }
            currentIndex++;
            loadQuestion();
        }

        function restartQuiz() {
            if (!quizActive) return;
            currentQuestions = shuffleArray([...rawData]);
            currentIndex = 0;
            correct = 0;
            wrong = 0;
            mistakes = [];
            isAnswered = false;
            reviewBlock.classList.add("hidden");
            answerInput.disabled = false;
            checkBtn.disabled = false;
            nextBtn.disabled = false;
            updateStats();
            loadQuestion();
        }

        function startQuiz() {
            startScreenDiv.classList.add("hidden");
            quizInterfaceDiv.classList.remove("hidden");
            quizActive = true;
            startQuotes();
            currentQuestions = shuffleArray([...rawData]);
            currentIndex = 0;
            correct = 0;
            wrong = 0;
            mistakes = [];
            isAnswered = false;
            reviewBlock.classList.add("hidden");
            updateStats();
            loadQuestion();
        }

        // event listeners
        startBtn.addEventListener("click", startQuiz);
        checkBtn.addEventListener("click", handleCheck);
        nextBtn.addEventListener("click", handleNext);
        restartBtn.addEventListener("click", restartQuiz);
        restartReviewBtn.addEventListener("click", restartQuiz);
        // Enter key magic
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (!quizActive) {
                    if (!startScreenDiv.classList.contains("hidden")) startQuiz();
                    return;
                }
                if (quizInterfaceDiv.classList.contains("hidden")) return;
                if (currentIndex >= currentQuestions.length) return;
                if (!isAnswered) handleCheck();
                else handleNext();
            }
        });
        window.addEventListener("beforeunload", () => { if (quoteInterval) clearInterval(quoteInterval); });
    </script>
</body>
</html>
