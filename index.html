<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Nook 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #fff9f0 0%, #ffe6f0 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1rem;
            color: #2c1810;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #b980f0, #ff9a8b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .subhead {
            font-size: 1.2rem;
            color: #a06050;
            margin: 0.5rem 0 2rem;
        }
        .quiz-card {
            background: white;
            border-radius: 2rem;
            padding: 1.2rem 1.8rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .quiz-link {
            background: #b980f0;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            text-decoration: none;
        }
        .donate-box {
            background: #fff0e0;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        footer {
            margin-top: 2rem;
            color: #c0a090;
        }
        @media (max-width: 500px) {
            .quiz-card { flex-direction: column; gap: 0.8rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Quiz Nook</h1>
    <div class="subhead">✨ made with love — for curious minds ✨</div>

    <div class="quiz-card">
        <span class="quiz-title">🇩🇪 German Vocabulary – Pronouns & Cases</span>
        <a href="german-quiz-1.html" class="quiz-link">Take quiz →</a>
    </div>

    <div class="donate-box">
        <span>☕️ Like this site? Support my work</span><br>
        <a href="#" class="quiz-link" style="background:#ffb347; display:inline-block; margin-top:0.8rem;">Buy me a coffee</a>
        <p style="font-size:0.75rem; margin-top:0.5rem;">(link will work when you add PayPal or Ko-fi)</p>
    </div>

    <footer>🌼 Free quizzes for everyone – new ones added often</footer>
</div>
</body>
</html>
