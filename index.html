<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🚀 A00 with Alex · German Course · Cosmic Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 40%, #010110, #000000);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }
        /* stars (same as before) */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: starGlow 4s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes starGlow {
            0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px #fff; }
            100% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 12px #ffec9e; }
        }
        .planet { position: fixed; font-size: 3rem; pointer-events: none; z-index: 0; filter: drop-shadow(0 0 15px cyan); }
        .earth { top: 15%; left: 5%; animation: floatEarth 20s infinite alternate; }
        .moon { bottom: 10%; right: 5%; animation: floatMoon 18s infinite alternate; }
        .mars { top: 60%; left: 85%; animation: floatMars 22s infinite alternate; }
        .rocket { position: fixed; bottom: 5%; left: 2%; font-size: 3rem; pointer-events: none; animation: flyRocket 20s infinite linear; z-index: 0; }
        @keyframes floatEarth { 0% { transform: translate(0,0); } 100% { transform: translate(40px,30px); } }
        @keyframes floatMoon { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,-20px); } }
        @keyframes floatMars { 0% { transform: translate(0,0); } 100% { transform: translate(50px,-30px); } }
        @keyframes flyRocket { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(1800px) translateY(-300px); } }
        
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(135deg, #e0b0ff, #a070ff, #6a3caf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(160, 120, 255, 0.4);
        }
        .sub {
            color: #b9f0ff;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            text-shadow: 0 0 8px cyan;
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .lesson-card {
            background: rgba(3, 8, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 2px solid rgba(0, 200, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,150,255,0.3);
            text-align: center;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .lesson-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,200,255,0.5);
            border-color: cyan;
        }
        .lesson-number {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: bold;
            color: #88ddff;
            text-shadow: 0 0 6px cyan;
        }
        .lesson-title {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            margin: 0.5rem 0;
            color: #f0fcff;
        }
        .lesson-desc {
            color: #cceeff;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .start-btn {
            background: #0066cc;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 12px #00aaff, 0 4px 0 #003366;
            transition: 0.1s;
            text-decoration: none;
            display: inline-block;
        }
        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 12px #00aaff;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #88aaff;
            font-size: 0.8rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .container { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="planet earth">🌍</div>
    <div class="planet moon">🌙</div>
    <div class="planet mars">🪐</div>
    <div class="rocket">🚀</div>
    <script>
        for(let i=0;i<150;i++){
            let s=document.createElement('div');
            s.classList.add('star');
            let sz=Math.random()*3+1;
            s.style.width=sz+'px';
            s.style.height=sz+'px';
            s.style.left=Math.random()*100+'%';
            s.style.top=Math.random()*100+'%';
            s.style.animationDelay=Math.random()*6+'s';
            document.body.appendChild(s);
        }
    </script>

    <div class="container">
        <div class="hero">
            <h1>🌟 A00 with Alex 🌟</h1>
            <div class="sub">🇩🇪 your German journey starts here · with love for Nafisa 🚀</div>
        </div>

        <div class="lessons-grid">
            <div class="lesson-card">
                <div class="lesson-number">📖 Lesson 01</div>
                <div class="lesson-title">✨ Hello & first steps</div>
                <div class="lesson-desc">Greetings, introducing yourself, countries, verbs: to be called, to come, to speak, to work, to study</div>
                <a href="lesson1.html" class="start-btn">🌙 Start Lesson →</a>
            </div>
            <!-- future lessons here -->
        </div>
        <footer>✨ with endless love for Nafisa · always shining ✨</footer>
    </div>
</body>
</html>
