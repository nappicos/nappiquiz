<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Nook 🌸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fff9f0 0%, #ffe6f0 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem;
      color: #2c1810;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #b980f0, #ff9a8b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .subhead {
      font-size: 1.2rem;
      color: #a06050;
      margin-top: 0.5rem;
    }

    .quiz-card {
      background: white;
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .quiz-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .quiz-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #2c1810;
    }

    .quiz-link {
      background: #b980f0;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }

    .quiz-link:hover {
      background: #9b5fd0;
    }

    .donate-box {
      background: #fff0e0;
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      margin-top: 2rem;
      border: 1px solid #ffd5b5;
    }

    .donate-btn {
      background: #ffb347;
      color: #2c1810;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 0.8rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      color: #c0a090;
      font-size: 0.8rem;
    }

    @media (max-width: 500px) {
      .quiz-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>📖 Quiz Nook</h1>
    <div class="subhead">✨ made with love — for curious minds ✨</div>
  </header>

  <!-- Your quizzes will appear here as cards -->
  <div class="quiz-card">
    <span class="quiz-title">🇩🇪 German Vocabulary – Topic 1</span>
    <a href="German%20vocabulary%20topic%201.html" class="quiz-link">Take quiz →</a>
  </div>

  <!-- You can add more quizzes below by copying this block and changing the title + filename -->
  <!--
  <div class="quiz-card">
    <span class="quiz-title">📝 HTML Basics Quiz</span>
    <a href="html-basics.html" class="quiz-link">Take quiz →</a>
  </div>
  -->

  <div class="donate-box">
    <span>☕️ Like this site? Support my work</span><br>
    <a href="#" class="donate-btn">Buy me a coffee</a>
    <p style="font-size:0.75rem; margin-top:0.5rem;">(link will work when you add a PayPal or Ko-fi)</p>
  </div>

  <footer>
    🌼 Free quizzes for everyone – new ones added often
  </footer>
</div>
</body>
</html>
